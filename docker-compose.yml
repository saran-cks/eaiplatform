name: core-api

services:
  core_api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      model_server:
        condition: service_healthy
      phoenix:
        condition: service_started
      guard_gateway:
        condition: service_healthy
    restart: unless-stopped
    networks: [core]

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Assumes curl in image; if absent, set core_api depends_on -> service_started.
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [core]

  phoenix:
    image: arizephoenix/phoenix:version-17.9.0
    ports:
      - "6006:6006"   # UI
      - "4317:4317"   # OTLP gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6006/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [core]

  model_server:
    # bge-m3 dense+sparse embeddings over gRPC (CPU-only sidecar).
    build:
      context: .
      dockerfile: sidecars/model_server/Dockerfile
    environment:
      EMBED_BACKEND: flag            # FP32 reference path; ONNX int8 quantization still pending.
      HF_HUB_OFFLINE: "1"            # weights are pre-downloaded into the mounted models/ dir.
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # Bind the local HF cache so the 7GB bge-m3 weights are NOT re-downloaded.
      - ./sidecars/model_server/models:/app/sidecars/model_server/models
    ports:
      - "50051:50051"
    healthcheck:
      # No HTTP surface (gRPC); the port only binds after model load + warmup, so a
      # successful TCP connect ≈ ready. python is in the image; curl is not.
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',50051),2).close()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s             # FP32 bge-m3 load + warmup is slow on CPU.
    networks: [core]

  guard_gateway:
    # Llama Prompt Guard 2 (86M) injection/jailbreak screening over HTTP (CPU-only sidecar).
    build:
      context: .
      dockerfile: sidecars/prompt_guard/Dockerfile
    environment:
      HF_HUB_OFFLINE: "1"            # PG2 weights are pre-downloaded into the mounted models/ dir.
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ./sidecars/prompt_guard/models:/app/sidecars/prompt_guard/models
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks: [core]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [core]

  valkey:
    image: valkey/valkey:9.1.0
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [core]

networks:
  core:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
  valkey_data:
